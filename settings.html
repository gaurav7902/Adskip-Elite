<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h2>AdSkip Elite</h2>

      <div class="card">
        <p class="label">Settings</p>

        <label class="toggle-row">
          <span>Skip ads immediately</span>
          <input type="checkbox" id="instant" />
        </label>

        <label class="toggle-row">
          <span>Show notification</span>
          <input type="checkbox" id="notify" />
        </label>
      </div>
    </div>

    <script src="settings.js"></script>
  </body>
</html>
